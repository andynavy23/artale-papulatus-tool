<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:image" content="https://andynavy23.github.io/artale-papulatus-tool/拉圖斯.png" />
    <meta property="og:title" content="Artale 困難拉圖斯 - 輔助工具(手機版)" />
    <meta property="og:description" content="aespaaa 公會製作, 透過分享畫面取得即時遊戲畫面, 提供相關輔助攻略資訊給玩家" />
    <meta property="og:url" content="https://andynavy23.github.io/artale-papulatus-tool/mobile.html" />
    <title>Artale 困難拉圖斯 - 輔助工具</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@500;700&display=swap');

        :root {
            --ms-window-bg: #ece9d8;
            --ms-header-blue: linear-gradient(to bottom, #4c66a4, #3a518d);
            --ms-border: #444;
            --color-mobs: #4db34d;
            --color-water: #4a90e2;
            --color-system: #a362cc;
        }

        /* 防止手機雙擊縮放與意外滾動 */
        * {
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #556688;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            min-height: 100vh;
            /* 防止下拉重新整理 */
            overscroll-behavior: contain;
        }

        /* 全螢幕狀態下的特殊樣式 */
        :fullscreen body { padding: 5px; }
        :-webkit-full-screen body { padding: 5px; }

        .window {
            background: var(--ms-window-bg);
            border: 2px solid var(--ms-border);
            border-radius: 8px 8px 0 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .window-header {
            background: var(--ms-header-blue);
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--ms-border);
        }

        .header-left {
            display: flex;
            flex-direction: column;
        }

        .guild-tag {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 0.8rem;
            color: #ffcc00;
        }

        /* 全螢幕按鈕樣式 */
        .fullscreen-btn {
            background: #ffcc00;
            color: #333;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 1px 1px 0 #fff inset;
        }
        .fullscreen-btn:active { transform: scale(0.95); }

        .timer-grid {
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            flex: 1;
        }

        @media (min-width: 600px) or (orientation: landscape) {
            .timer-grid { grid-template-columns: 1fr 1fr 1fr; }
        }

        .timer-card {
            background: #fdfdfd;
            border: 2px solid #aaa;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
        }

        .timer-card.active { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .timer-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
            padding: 2px 10px;
            border-radius: 10px;
            color: white;
            width: 100%;
            text-align: center;
        }

        .bg-mobs { background-color: var(--color-mobs); }
        .bg-water { background-color: var(--color-water); }
        .bg-system { background-color: var(--color-system); }

        .settings-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            margin-bottom: 5px;
            width: 100%;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .switch-row {
            display: flex;
            gap: 5px;
            justify-content: center;
            width: 100%;
        }

        .voice-switch, .restart-switch {
            font-size: 0.75rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            background: #eee;
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .settings-area input[type="number"] {
            width: 45px;
            border: 1px solid #999;
            border-radius: 3px;
            text-align: center;
            padding: 1px;
        }

        .timer-display {
            font-size: 3rem;
            font-weight: 800;
            font-family: 'Arial Black', sans-serif;
            margin: 2px 0;
            color: #333;
            transition: color 0.1s;
        }

        .running-text { color: #d00; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .timer-btn {
            width: 100%;
            padding: 10px;
            border: 2px solid #555;
            border-radius: 5px;
            background: linear-gradient(to bottom, #eeeeee, #cccccc);
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 1px 1px 0 #fff;
        }

        .timer-btn:active {
            background: linear-gradient(to bottom, #bbbbbb, #dddddd);
            transform: scale(0.98);
        }

        .timer-btn.is-running {
            background: linear-gradient(to bottom, #ff9999, #ff5555);
            color: white;
            border-color: #800;
        }

        .reset-btn {
            font-size: 0.65rem;
            padding: 2px 5px;
            background: #999;
            color: white;
            border: none;
            border-radius: 3px;
        }

        .footer-hint {
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            color: #555;
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="window" id="app-window">
        <div class="window-header">
            <div class="header-left">
                <span>困難拉圖斯攻略助手</span>
                <span class="guild-tag">aespaaa 公會製作</span>
            </div>
            <button class="fullscreen-btn" onclick="toggleFullScreen()">全螢幕模式</button>
        </div>

        <div class="timer-grid">
            <div class="timer-card" id="card-mobs">
                <div class="timer-title bg-mobs">召喚小怪 (屋頂)</div>
                <div class="settings-area">
                    <div class="input-row">
                        <input type="number" id="input-mobs" value="50" min="1">s
                        <button class="reset-btn" onclick="resetSetting('mobs', 50)">重置</button>
                    </div>
                    <div class="switch-row">
                        <label class="voice-switch"><input type="checkbox" id="voice-mobs" checked> 🔊 語音</label>
                        <label class="restart-switch"><input type="checkbox" id="restart-mobs" checked> 🔄 循環</label>
                    </div>
                </div>
                <div id="display-mobs" class="timer-display">50.0</div>
                <button class="timer-btn" id="btn-mobs" onclick="handleTimer('mobs')">開始倒數</button>
            </div>

            <div class="timer-card" id="card-water">
                <div class="timer-title bg-water">黑水生成 (即死)</div>
                <div class="settings-area">
                    <div class="input-row">
                        <input type="number" id="input-water" value="70" min="1">s
                        <button class="reset-btn" onclick="resetSetting('water', 70)">重置</button>
                    </div>
                    <div class="switch-row">
                        <label class="voice-switch"><input type="checkbox" id="voice-water" checked> 🔊 語音</label>
                        <label class="restart-switch"><input type="checkbox" id="restart-water" checked> 🔄 循環</label>
                    </div>
                </div>
                <div id="display-water" class="timer-display">70.0</div>
                <button class="timer-btn" id="btn-water" onclick="handleTimer('water')">開始倒數</button>
            </div>

            <div class="timer-card" id="card-system">
                <div class="timer-title bg-system">系統扣時 (指針)</div>
                <div class="settings-area">
                    <div class="input-row">
                        <input type="number" id="input-system" value="10" min="1">s
                        <button class="reset-btn" onclick="resetSetting('system', 10)">重置</button>
                    </div>
                    <div class="switch-row">
                        <label class="voice-switch"><input type="checkbox" id="voice-system" checked> 🔊 語音</label>
                        <label class="restart-switch"><input type="checkbox" id="restart-system" checked> 🔄 循環</label>
                    </div>
                </div>
                <div id="display-system" class="timer-display">10.0</div>
                <button class="timer-btn" id="btn-system" onclick="handleTimer('system')">開始倒數</button>
            </div>
        </div>

        <div class="footer-hint">
            💡 單擊：開始/暫停 | <b>雙擊：重置計時</b> (已優化避免雙擊縮放)<br>
            iOS 使用者請注意：全螢幕模式不支援，請使用「分享 -> 加入主畫面」
        </div>
    </div>

    <script>
        const timers = {
            mobs: { timeLeft: 50, interval: null, running: false, lastClick: 0 },
            water: { timeLeft: 70, interval: null, running: false, lastClick: 0 },
            system: { timeLeft: 10, interval: null, running: false, lastClick: 0 }
        };

        let voiceUnlocked = false;

        // 全螢幕切換邏輯
        function toggleFullScreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen();
                } else if (docElm.webkitRequestFullscreen) {
                    docElm.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        function handleTimer(id) {
            if (!voiceUnlocked) unlockVoice();

            const now = Date.now();
            const timer = timers[id];
            const inputVal = parseFloat(document.getElementById(`input-${id}`).value) || 10;

            if (now - timer.lastClick < 500) {
                resetTimer(id, inputVal);
                timer.lastClick = 0;
                return;
            }
            timer.lastClick = now;

            if (timer.running) pauseTimer(id);
            else startTimer(id);
        }

        function unlockVoice() {
            if (!('speechSynthesis' in window)) return;
            const silentUtterance = new SpeechSynthesisUtterance('');
            silentUtterance.volume = 0;
            window.speechSynthesis.speak(silentUtterance);
            voiceUnlocked = true;
        }

        function startTimer(id) {
            const timer = timers[id];
            const btn = document.getElementById(`btn-${id}`);
            const display = document.getElementById(`display-${id}`);
            const card = document.getElementById(`card-${id}`);

            timer.running = true;
            btn.classList.add('is-running');
            btn.innerText = "倒數中 (暫停)";
            display.classList.add('running-text');
            card.classList.add('active');

            timer.interval = setInterval(() => {
                timer.timeLeft -= 0.1;
                const autoRestart = document.getElementById(`restart-${id}`).checked;
                const isVoiceEnabled = document.getElementById(`voice-${id}`).checked;

                if (timer.timeLeft <= 0) {
                    if (isVoiceEnabled) {
                        if (id == "mobs") speak("召喚小怪");
                        else if (id == "water") speak("黑水");
                        else if (id == "system") speak("系統扣時");
                    }
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    if (autoRestart) {
                        timer.timeLeft = parseFloat(document.getElementById(`input-${id}`).value);
                    } else {
                        timer.timeLeft = 0;
                        pauseTimer(id);
                        btn.innerText = "已完成 (雙擊重置)";
                    }
                }
                display.innerText = Math.max(0, timer.timeLeft).toFixed(1);
            }, 100);
        }

        function pauseTimer(id) {
            const timer = timers[id];
            const btn = document.getElementById(`btn-${id}`);
            const display = document.getElementById(`display-${id}`);
            const card = document.getElementById(`card-${id}`);
            clearInterval(timer.interval);
            timer.running = false;
            btn.classList.remove('is-running');
            btn.innerText = "繼續倒數";
            display.classList.remove('running-text');
            card.classList.remove('active');
        }

        function resetTimer(id, duration) {
            const timer = timers[id];
            const btn = document.getElementById(`btn-${id}`);
            const display = document.getElementById(`display-${id}`);
            const card = document.getElementById(`card-${id}`);
            clearInterval(timer.interval);
            timer.running = false;
            timer.timeLeft = duration;
            display.innerText = duration.toFixed(1);
            display.classList.remove('running-text');
            btn.innerText = "開始倒數";
            btn.classList.remove('is-running');
            card.classList.remove('active');
        }

        function resetSetting(id, defaultVal) {
            document.getElementById(`input-${id}`).value = defaultVal;
            resetTimer(id, defaultVal);
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.pitch = 1;
            utterance.rate = 1.2;
            utterance.volume = 1;
            setTimeout(() => {window.speechSynthesis.speak(utterance);}, 0);
        }
    </script>
</body>
</html>
